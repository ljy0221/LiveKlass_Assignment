spring:
  datasource:
    url: jdbc:h2:mem:notificationdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.example.notification: DEBUG

notification:
  async:
    core-pool-size: 5
    max-pool-size: 20
    queue-capacity: 100
    thread-name-prefix: "notification-"
  retry:
    max-attempts: 3
    # 지수 백오프: 1분, 2분, 4분
    initial-delay-seconds: 60
    multiplier: 2.0
  stuck-recovery:
    threshold-minutes: 10
    fix-rate-ms: 600000   # 10분
  scheduler:
    fix-rate-ms: 60000    # 1분
